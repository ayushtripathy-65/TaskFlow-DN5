<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput [(ngModel)]="credentials.email" name="email" type="email" required>
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [(ngModel)]="credentials.password" name="password" type="password" required>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="full-width">Login</button>
      </form>

      <div *ngIf="error" class="error">{{ error }}</div>
    </mat-card-content>
    <mat-card-actions>
      <a routerLink="/register">Don't have an account? Register</a>
    </mat-card-actions>
  </mat-card>
</div>
