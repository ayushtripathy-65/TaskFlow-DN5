<div class="task-container">
  <h2>My Tasks</h2>
  <button mat-raised-button color="primary" routerLink="/tasks/create">Create New Task</button>
  
  <div class="task-grid">
    <mat-card *ngFor="let task of tasks" class="task-card">
      <mat-card-header>
        <mat-card-title>{{ task.title }}</mat-card-title>
        <mat-card-subtitle>{{ task.projectName }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>{{ task.description }}</p>
        <div class="chips">
          <span class="chip" [ngClass]="task.status.toLowerCase()">{{ task.status }}</span>
          <span class="chip priority">{{ task.priority }}</span>
        </div>
        <p *ngIf="task.dueDate">Due: {{ task.dueDate | date }}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button [routerLink]="['/tasks/edit', task.id]">Edit</button>
        <button mat-button color="warn" (click)="deleteTask(task.id)">Delete</button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
